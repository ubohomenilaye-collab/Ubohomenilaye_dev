<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Veritas University Orientation Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 20px;
        }
        form {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            max-width: 600px;
            margin: auto;
        }
        fieldset {
            border: 2px solid #4CAF50;
            border-radius: 8px;
            padding: 15px;
        }
        legend {
            font-weight: bold;
            color: #4CAF50;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }
        .inline {
            width: auto;
        }
        .buttons {
            margin-top: 15px;
        }
    </style>
</head>
<body>

<h2>Veritas University Orientation Registration Form</h2>

<form>

    <fieldset>
        <legend>Student Information</legend>

        <!-- Full Name -->
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required>

        <!-- Matric Number -->
        <label for="matric">Matric Number:</label>
        <input type="text" id="matric" name="matric" placeholder="Enter matric number" required>

        <!-- Email -->
        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

        <!-- Age -->
        <label for="age">Age:</label>
        <input type="number" id="age" name="age" placeholder="Enter your age" required>

        <!-- Date of Birth -->
        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob" required>

        <!-- Gender -->
        <label>Gender:</label>
        <input type="radio" name="gender" value="male" class="inline" required> Male
        <input type="radio" name="gender" value="female" class="inline"> Female
        <input type="radio" name="gender" value="other" class="inline"> Other

        <!-- Faculty Dropdown -->
        <label for="faculty">Select Faculty:</label>
        <select id="faculty" name="faculty" required>
            <option value="">--Select Faculty--</option>
            <option value="science">Science</option>
            <option value="arts">Arts</option>
            <option value="engineering">Engineering</option>
            <option value="management">Management Sciences</option>
        </select>

        <!-- Documents -->
        <label>Documents Submitted:</label>
        <input type="checkbox" name="documents" value="birth_cert" class="inline"> Birth Certificate
        <input type="checkbox" name="documents" value="waec" class="inline"> WAEC Result
        <input type="checkbox" name="documents" value="admission_letter" class="inline"> Admission Letter

        <!-- File Upload -->
        <label for="file">Upload Passport/Document:</label>
        <input type="file" id="file" name="file" required>

        <!-- Comments -->
        <label for="comments">Additional Comments:</label>
        <textarea id="comments" name="comments" rows="4" placeholder="Enter any questions or comments"></textarea>

        <!-- Buttons -->
        <div class="buttons">
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
        </div>

    </fieldset>

</form>

</body>
</html>
